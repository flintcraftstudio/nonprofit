# Production compose — synced to the VPS by the deploy workflow, which sets
# IMAGE to the GHCR image for this repo. Caddy on the host terminates TLS
# and proxies to 127.0.0.1:8080.
#
# One-time VPS setup: create /opt/<project>/ containing a .env file
# (SESSION_SECRET, Postmark keys, etc.). Everything else arrives on deploy.
services:
  web:
    image: ${IMAGE:?set IMAGE to the GHCR image, e.g. ghcr.io/org/project:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/app.db
    volumes:
      - app-data:/data
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  app-data:
