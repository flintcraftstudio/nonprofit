name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  PROJECT: ${{ github.event.repository.name }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # The deploy key's authorized_keys entry (see provision.sh) forces the
      # command `cd /opt/<project> && docker compose pull && docker compose up -d`
      # on connect, so we just open one SSH session — the server does the rest
      # against its own /opt/<project>/docker-compose.yml (which pulls :latest).
      # No compose file is copied: a forced-command key can't run scp, and the
      # server already has its compose file from provisioning.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /opt/${{ env.PROJECT }} && docker compose pull && docker compose up -d
