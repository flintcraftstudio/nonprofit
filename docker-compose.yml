# Local/dev compose — builds the image from source.
# Production deploys use docker-compose.prod.yml with the GHCR image.
services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/app.db
    volumes:
      - app-data:/data
    ports:
      - "8080:8080"

volumes:
  app-data:
